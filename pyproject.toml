[tool.ruff]
target-version = "py313"
line-length = 120
extend-exclude = [
  "admin-ui",
  "data",
]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.per-file-ignores]
"src/supply_bot/services/dialogue_contract.py" = ["E501"]
"src/supply_bot/services/dialogue_contract_prompt_part*.py" = ["E501"]
"src/supply_bot/storage_defaults.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.coverage.run]
source = ["src"]
omit = ["tests/*"]
